name: Build MyOS

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y nasm gcc-multilib qemu-system-x86

      - name: Build OS from src/
        working-directory: src
        run: |
          echo "⚙️ Building in src/..."
          nasm -f bin boot.asm -o boot.bin
          nasm -f elf32 drivers.asm -o drivers.o
          gcc -m32 -c kernel.c -o kernel.o
          gcc -m32 -c gui.c -o gui.o
          gcc -m32 -c файлы.c -o файлы.o
          ld -m elf_i386 -Ttext 0x1000 drivers.o kernel.o gui.o файлы.o -o kernel.bin
          cat boot.bin kernel.bin > os.img
          ls -la *.bin *.img

      - name: Test boot (QEMU headless)
        working-directory: src
        run: |
          timeout 12 qemu-system-i386 -fda os.img -display none -serial stdio > qemu.log 2>&1 || true
          if grep -q "MyOS v0.1" qemu.log; then
            echo "✅ Boot successful"
          else
            echo "⚠️ Boot failed or no signature found"
            cat qemu.log
            exit 1
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: os.img
          path: src/os.img

      - name: Create Release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: src/os.img
          body: |
            MyOS v0.1 — bare-metal OS built on ${{ github.sha }}
            Files: boot.asm, drivers.asm, файлы.c, gui.c, kernel.c
