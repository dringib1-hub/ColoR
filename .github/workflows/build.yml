name: Build MyOS
on: push
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: sudo apt-get install -y nasm gcc-multilib

      - name: Build
        run: |
          mkdir -p src
          # Убедимся, что файлы есть
          ls -la src/
          # Собираем
          nasm -f bin src/boot.asm -o src/boot.bin
          nasm -f elf32 src/drivers.asm -o src/drivers.o
          gcc -m32 -c src/kernel.c -o src/kernel.o
          gcc -m32 -c src/gui.c -o src/gui.o
          gcc -m32 -c src/files.c -o src/files.o
          # Ключевое: -e kernel_main и --no-warn-mismatch
          ld -m elf_i386 -Ttext 0x1000 -e kernel_main \
             src/drivers.o src/kernel.o src/gui.o src/files.o \
             -o src/kernel.bin
          cat src/boot.bin src/kernel.bin > src/os.img
          echo "✅ os.img ready, size: $(stat -c%s src/os.img) bytes"

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: os.img
          path: src/os.img
