name: Build MyOS
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: |
          sudo apt-get install -y nasm gcc-multilib
          cd src
          nasm -f bin boot.asm -o boot.bin
          nasm -f elf32 drivers.asm -o drivers.o
          gcc -m32 -c kernel.c -o kernel.o
          gcc -m32 -c gui.c -o gui.o
          gcc -m32 -c files.c -o files.o
          ld -m elf_i386 -Ttext 0x1000 drivers.o kernel.o gui.o files.o -o kernel.bin
          cat boot.bin kernel.bin > os.img
          echo "✅ Built os.img"
      - uses: actions/upload-artifact@v4
        with:
          name: os.img
          path: src/os.img
