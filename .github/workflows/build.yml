- name: Compile kernel.c
  run: |
    gcc -m32 -ffreestanding -nostdlib -c src/kernel.c -o kernel.o
    ld -m elf_i386 -Ttext 0x8000 kernel.o -o kernel.elf
    objcopy -O binary kernel.elf kernel.bin

- name: Compile gui.c
  run: |
    gcc -m32 -ffreestanding -nostdlib -c src/gui.c -o gui.o
    ld -m elf_i386 -Ttext 0x9000 gui.o -o gui.elf
    objcopy -O binary gui.elf gui.bin

- name: Add snake.clr
  run: dd if=snake.clr of=disk.img bs=512 seek=14 conv=notrunc
